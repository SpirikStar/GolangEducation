<!doctype html>
<html lang="ru" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");
      body {
        font-family: "Inter", system-ui, sans-serif;
      }
      .emoji {
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        user-select: none;
      }
      .emoji:hover {
        transform: scale(1.25) rotate(8deg);
      }
      .emoji:active {
        transform: scale(0.85);
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 50;
      }

      .live-counter {
        animation: counterPulse 2s infinite;
      }

      @keyframes counterPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.85;
        }
      }
    </style>
  </head>
  <body class="bg-zinc-950 text-white h-screen flex flex-col overflow-hidden">
    <!-- Top bar -->
    <header
      class="flex justify-end items-center px-8 py-6 border-b border-zinc-800"
    >
      <div
        class="flex items-center gap-3 bg-rose-500/10 text-rose-400 px-5 py-2.5 rounded-3xl border border-rose-500/30"
      >
        <div class="w-3 h-3 bg-rose-400 rounded-full animate-pulse"></div>
        <span class="font-semibold text-xl tracking-wide">LIVE</span>

        <div class="h-6 w-px bg-rose-500/30"></div>

        <div class="flex items-center gap-1.5 live-counter">
          <span id="user-count" class="font-mono font-bold text-lg tabular-nums"
            >1247</span
          >
          <span class="text-rose-400/70 text-sm font-medium">сейчас</span>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <div class="flex-1 flex items-center justify-center relative">
      <div class="flex gap-10 md:gap-20">
        <div class="emoji text-8xl md:text-[130px]" data-emoji="😀">😀</div>
        <div class="emoji text-8xl md:text-[130px]" data-emoji="😎">😎</div>
        <div class="emoji text-8xl md:text-[130px]" data-emoji="🔥">🔥</div>
        <div class="emoji text-8xl md:text-[130px]" data-emoji="🚀">🚀</div>
      </div>
    </div>

    <canvas id="canvas"></canvas>

    <footer class="py-6 text-center text-zinc-500 text-sm">
      Нажми на смайлик — будет салют!
    </footer>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { alpha: true });
      let particles = [];
      let lastExplosion = 0;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      class Particle {
        constructor(x, y, emoji) {
          this.x = x;
          this.y = y;
          this.emoji = emoji;
          this.size = Math.random() * 26 + 20;
          this.speedX = Math.random() * 13 - 6.5;
          this.speedY = Math.random() * 13 - 10;
          this.gravity = 0.22;
          this.life = 75;
          this.rotation = Math.random() * 360;
          this.rotationSpeed = Math.random() * 10 - 5;
          this.alpha = 1;
        }

        update() {
          this.speedY += this.gravity;
          this.x += this.speedX;
          this.y += this.speedY;
          this.rotation += this.rotationSpeed;
          this.life--;
          this.alpha = this.life / 75;
          this.size *= 0.982;
        }

        draw() {
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.translate(this.x, this.y);
          ctx.rotate((this.rotation * Math.PI) / 180);
          ctx.font = `${this.size}px sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(this.emoji, 0, 0);
          ctx.restore();
        }
      }

      function createExplosion(x, y) {
        const now = Date.now();
        if (now - lastExplosion < 80) return; // защита от спама
        lastExplosion = now;

        const emojis = ["✨", "⭐", "💥", "🔥", "🌟", "🎉", "🚀"];
        const count = 32; // уменьшено для производительности

        for (let i = 0; i < count; i++) {
          const p = new Particle(
            x,
            y,
            emojis[Math.floor(Math.random() * emojis.length)],
          );
          particles.push(p);
        }
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.update();
          p.draw();

          if (p.life <= 0 || p.size < 6) {
            particles.splice(i, 1);
          }
        }

        requestAnimationFrame(animate);
      }

      // Счётчик пользователей
      let userCount = 1247;
      const userCountEl = document.getElementById("user-count");

      function updateUserCount() {
        userCount += Math.floor(Math.random() * 6) + 3;
        userCountEl.textContent = userCount.toLocaleString("ru-RU");
      }

      // Click handlers
      document.querySelectorAll(".emoji").forEach((el) => {
        el.addEventListener("click", (e) => {
          const rect = el.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;

          createExplosion(centerX, centerY);

          // Feedback
          el.style.transition = "transform 0.1s";
          el.style.transform = "scale(0.7)";
          setTimeout(() => (el.style.transform = "scale(1.25)"), 60);
          setTimeout(() => (el.style.transform = ""), 280);
        });
      });

      // Keyboard support (пробел = случайный салют)
      document.addEventListener("keydown", (e) => {
        if (e.key === " ") {
          const emojis = document.querySelectorAll(".emoji");
          const random = emojis[Math.floor(Math.random() * emojis.length)];
          const rect = random.getBoundingClientRect();
          createExplosion(
            rect.left + rect.width / 2,
            rect.top + rect.height / 2,
          );
        }
      });

      // Init
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();
      animate();

      setInterval(updateUserCount, 1400);
    </script>
  </body>
</html>
